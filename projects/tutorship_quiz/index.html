<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
:root{
    --cell-size: 200px;
    --font-size: 14pt;
    --font-size2: 1rem;
    --font-size3: 1.5rem;
    --c-wooden: #a0500f;
    --c-wooden-dark: #381f17;
}


* {
    box-sizing: border-box;
    font-family: sans-serif;
    font-size: var(--font-size);
}
body {
    margin: 0;
}

button {
    background-color: #f0f0f0;

    border: 1px solid #404040;
    border-radius: 3px;
    cursor: pointer;
}
button:active {
    background-color: #a0a0a0;
}

.button-img {
    padding: 0;
    display: block;
}
.button-img > img {
    display: block;
    width: var(--font-size);
    height: var(--font-size);
}

input, textarea {
    background-color: #ffffff;
    border: 1px solid #404040;
    border-radius: 3px;
}

#divWhole { /* class: flex */
    justify-content: stretch;

    height: 100dvh; /* stretch the page to the entire height of the browser window */
    overflow: hidden;

    background-color: #e0f0ff;
}



/* HEADER */

header > .top { /* class: flex row */
    background-color: lightblue;

    padding: 10px 10px 10px 20px;
    justify-content: space-between;
}
header * {
    margin: 0;
}
header h1 {
    font-size: var(--font-size3);
}

#tCellsLeft {
    margin: 6px 0;
}


/* DROPDOWN */
.dropdown {
    position: relative;
}
.dropdown > .dropdown-content { /* class: flex */
    position: absolute;
    top: 100%;
    right: 0;

    width: max-content;
    max-width: calc(100vw - 30px);

    z-index: 1;

    border: 1px solid black;
    box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.5);
}

.dropdown > .dropdown-content > button {
    /* dropdown options */
    text-align: left;
    border: none;
    border-radius: 0;

    background-color: lightblue;
}
.dropdown > .dropdown-content > button:not(:last-child) {
    border-bottom: 1px solid black;
}
.dropdown > .dropdown-content > button:active {
    background-color: #7c99a3;
}
#bDropdownEditButton.green {
    background-color: #82e779;
}


/* DIV SCALING, CELLS */


#divPositioning { /* class: flex center */
    overflow: hidden;
    flex-grow: 1;
}
#divScaling { /* class: flex center */
    overflow: hidden;
    width: 100%;
}
#divScaling.scroll {
    overflow: auto;
    justify-content: start;
    align-items: start;
}

#divTable {
    padding: 20px; /* use the property padding instead of margin to maintain spacing when scaling the content up and down */
}

#cellTable {
    border-collapse: collapse;
    box-shadow: 0px 0px 20px black;
}
#cellTable td {
    padding: 0;
    border: 6px ridge var(--c-wooden);
}

.cell-whole-area {
    width: var(--cell-size);
    height: var(--cell-size);
    background-color: var(--c-wooden-dark);
}
.cell-whole {
    position: relative;
    width: 100%;
    height: 100%;

    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    transform-style: preserve-3d;
}


.cell-whole.js-revealed {
    transform: rotateY(180deg);
}
.cell-whole.js-hide-front > .cell-front {
    display: none;
}
.cell-whole.js-hide-back > .cell-back {
    display: none;
}
.cell-whole.js-used {
    transform: rotateY(360deg);
}

.cell-front, .cell-back {
    position: absolute;
    width: 100%;
    height: 100%;

    backface-visibility: hidden;
}

.cell-front {
    background-repeat: no-repeat;
}

.cell-back {
    background-color: lightblue;

    display: flex;
    flex-direction: column;
    transform: rotateY(180deg);

    padding: 0 4px;
}

.cell-back > .top {
    flex-grow: 1;
    overflow: hidden;
}

.cell-back p {
    text-align: center;
    margin: 12pt 0pt;
}
.cell-back p.top {
    margin-bottom: 0;
}
p.bold {
    font-weight: bold;
}


/* MODAL */

#divModal { /* class: flex center */
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.5);
}
#divModalContent { /* class: flex */
    width: calc(100% - 40px);
    max-width: 600px;
    max-height: calc(100% - 20px);
}
#divModalFrame {
    padding: 20px;
    border-radius: 12px;
    background-color: lightblue;

    /* in case of content overflow */
    overflow-y: auto;

    margin-bottom: 20px;
}

.modalContent * {
    font-size: var(--font-size2);
}
.modalContent > * {
    text-align: center;
    font-size: var(--font-size3);
    margin: 0;
}

.modalContent > h3 {
    font-weight: bold;

    margin-bottom: 1em;
}


/* MODAL INDEX 1 */

#fEditCell > div {
    display: flex;
    flex-direction: row;
    align-items: stretch;
}
#fEditCell label {
    padding-right: 10px;
}


.radio-fDifficulty > input {
    display: none;
}
#fEditCell .radio-fDifficulty > label {
    display: block;
    position: relative;

    box-sizing: initial;
    user-select: none;
    cursor: pointer;

    padding: 0px;
    width: 20px;
    height: 20px;

    background-color: #f0f0f0;
    border: 1px solid #404040;
    border-radius: 3px;
}
/* click effect */
.radio-fDifficulty > label > div {
    position: absolute;
    width: 100%;
    height: 100%;
    background-color: #00000040;
    visibility: hidden;
}
.radio-fDifficulty > label:active > div {
    visibility: visible;
}
.radio-fDifficulty > input:checked + label {
    outline: 2px solid red;
}


/* MODAL INDEX 2 */

#divModalFrame #selectedImage {
    display: block;
    margin: auto; /* center the image horizontally */

    max-width: 100%;
    max-height: 300px;
    border: 1px solid black;
    box-sizing: content-box;
}


/* GENERAL */

.hidden {
    display: none !important;
}
.no-transition {
    transition: none !important;
}

.flex {
    display: flex;
    flex-direction: column;
}
.flex.center {
    justify-content: center;
    align-items: center;
}
.flex.row {
    flex-direction: row;
}
.flex.row.m4 > *:not(:last-child) {
    margin-right: 4px;
}
.flex.row.m10 > *:not(:last-child) {
    margin-right: 10px;
}

/* Small screens */
@media screen and (min-resolution: 2dppx) {
  :root {
    --font-size2: 0.8rem;
    --font-size3: 1.2rem;
  }
  #divModalFrame #selectedImage {
    max-height: 200px;
  }
}

    <title>1-Игровая модель наставничества</title>

<body>
    <div id="divWhole" class="flex">
        <header>
            <div class="top flex row">
                <h1>Игровая модель наставничества</h1>
                <div class="panel flex row m10" style="align-items: center;">
                    <div class="dropdown">
                        <button id="bDropdown">Меню</button>
                        <div class="dropdown-content flex hidden" id="dropdownContent">
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <div id="divPositioning" class="flex center">
            <div id="divScaling"  class="flex center">
                <div id="divTable">
                    <table id="cellTable">
                    </table>
                </div>
            </div>
            <div>
                <p id="tCellsLeft">0 ячеек осталось</p>
            </div>
        </div>
    </div>
    

    <div id="divModal" class="ev-transparent hidden flex center">
        <div id="divModalContent" class="ev-transparent flex">
            <div id="divModalFrame">
                <div class="modalContent hidden">
                    <p id="divModalP1" style="margin-bottom: 1.5em;"></p>
                    <p id="divModalP2" class="bold"></p>
                </div>
                <div class="modalContent hidden">
                    <h3>Редактировать ячейку</h3>
                    <div id="fEditCell" class="mb0-5">
                        <div style="margin-bottom: 0.5em;">
                            <label for="fQuestion">Вопрос</label>
                            <textarea id="fQuestion" name="fQuestion" rows="5" 
                                style="resize: none; flex-grow: 1;"
                            ></textarea>
                        </div>
                        <div style="margin-bottom: 0.5em;">
                            <label>Сложность</label>
                            <div class="flex row m4">
                                <div class="radio-fDifficulty">
                                    <input type="radio" id="fDifficulty0" name="fDifficulty" value="0">
                                    <label for="fDifficulty0" data-value="0">
                                        <div></div>
                                    </label>
                                </div>
                                <div class="radio-fDifficulty">
                                    <input type="radio" id="fDifficulty1" name="fDifficulty" value="1">
                                    <label for="fDifficulty1" data-value="1">
                                        <div></div>
                                    </label>
                                </div>
                                <div class="radio-fDifficulty">
                                    <input type="radio" id="fDifficulty2" name="fDifficulty" value="2">
                                    <label for="fDifficulty2"  data-value="2">
                                        <div></div>
                                    </label>
                                </div>
                                <div class="radio-fDifficulty">
                                    <input type="radio" id="fDifficulty3" name="fDifficulty" value="3">
                                    <label for="fDifficulty3" data-value="3">
                                        <div></div>
                                    </label>
                                </div>
                                <div class="radio-fDifficulty">
                                    <input type="radio" id="fDifficulty4" name="fDifficulty" value="4">
                                    <label for="fDifficulty4" data-value="4">
                                        <div></div>
                                    </label>
                                </div>
                                <div class="radio-fDifficulty">
                                    <input type="radio" id="fDifficulty5" name="fDifficulty" value="5">
                                    <label for="fDifficulty5" data-value="5">
                                        <div></div>
                                    </label>
                                </div>
                            </div>
                        </div>
                        <div>
                            <label for="fPoints">Баллов</label>
                            <input type="number" id="fPoints" name="fPoints" style="width: 100px">
                        </div>
                    </div>
                </div>
                <div class="modalContent hidden">
                    <h3>Редактировать таблицу</h3>
                    <div id="fSettings">
                        <div style="margin-bottom: 1em;">
                            <div style="margin-bottom: 0.5em;">
                                <label>Фон для таблицы</label>
                                <button id="fSelectImage">Выбрать изображение</label>
                            </div>
                            
                            <img id="selectedImage">
                        </div>
                        <div style="margin-bottom: 0.5em;">
                            <label for="fColumns">Размер таблицы</label>
                            <input type="number" id="fColumns" name="fColumns" min="3" max="10" style="width: 40pt">
                            <label>x</label>
                            <input type="number" id="fRows" name="fRows" min="3" max="10" style="width: 40pt">
                        </div>
                        <div>
                            <input type="checkbox" id="fShuffleOnStart" name="fShuffleOnStart" style="width: 12pt; height: 12pt;">
                            <label for="fShuffleOnStart">Перемешать при запуске игры</label>
                        </div>
                    </div>
                </div>
                <div class="modalContent hidden">
                    <h3 id="t3Top" style="margin-bottom: 1.5em;">Очистить</h3>
                    <p id="t3Bottom">Вы уверены?</p>
                </div>
            </div>
            <div id="divModalButtons" class="ev-transparent flex center row m10">
            </div>
        </div>
    </div>

    <!-- hidden file inputs -->
    <input type="file" accept="image/*" id="fLoadImage" class="hidden">
    <input type="file" accept="text/plain" id="fLoadTable" class="hidden">

function randomNumber(min, max, span = 1) {
    return (Math.floor(Math.random() * Math.abs(max - min + span) / span) * span) + min;
}
function SklonenieNoun(number, singular, dual, plural) {
    return ((number % 10 == 1 && !(number % 100 > 10 && number % 100 < 20))
        ? singular
        : (number % 10 > 1 && number % 10 < 5 && !(number % 100 > 10 && number % 100 < 20))
            ? dual
            : plural);
}
function writePoints(points) {
    return `+${points} ${SklonenieNoun(points, "балл", "балла", "баллов")}`;
}
function emptyQuestion() {
    return { question: "", difficulty: 0, points: 0 };
}
function readFile(blob, mode) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = function (event) {
            resolve((event.target.result));
        };
        reader.onerror = function () {
            reject();
        };
        if (mode === "dataURL") {
            reader.readAsDataURL(blob);
        }
        else {
            reader.readAsText(blob);
        }
    });
}
function downloadFile(data, filename, type) {
    const blob = new Blob([data], { type: type });
    const url = URL.createObjectURL(blob);
    const anchor = document.createElement('a');
    anchor.href = url;
    anchor.download = filename;
    document.body.appendChild(anchor);
    anchor.click();
    document.body.removeChild(anchor);
    URL.revokeObjectURL(url);
}
function validateNumber(number) {
    return (Number.isNaN(number) || number < 0) ? 0 : number;
}
function addZeros(number, length) {
    return String(number).padStart(length, "0");
}
function writeDatetime() {
    const datetime = new Date();
    return (datetime.getFullYear()
        + addZeros(datetime.getMonth() + 1, 2)
        + addZeros(datetime.getDate(), 2)
        + "-"
        + addZeros(datetime.getHours(), 2)
        + addZeros(datetime.getMinutes(), 2)
        + addZeros(datetime.getSeconds(), 2));
}

            el.className = properties.class;

            for (let property in properties.style) {
                el.style.setProperty(property, properties.style[property]);
            }

        if (properties.dataset) {
            for (let data in properties.dataset) {
                el.dataset[data] = properties.dataset[data];
            }

class ScaleContainer {
    constructor() {
        this.dp = window.devicePixelRatio;
        this.scaleFactor = 1;
    }
    scaleContainer() {
        el.divScaling.scroll(0, 0);
        const availableW = el.divScaling.clientWidth;
        const availableH = el.divScaling.clientHeight;
        const contentW = el.divTable.clientWidth;
        const contentH = el.divTable.clientHeight;
        const newScaleFactor = Math.min(Math.min((availableW / contentW), (availableH / contentH)), 1);
        if (this.scaleFactor !== newScaleFactor) {
            this.scaleFactor = newScaleFactor;
            if (this.scaleFactor > 0.6 / this.dp) {
                el.divScaling.classList.remove("scroll");
                el.divTable.style.transform = `scale(${this.scaleFactor})`;
            }
            else {

                el.divScaling.classList.add("scroll");
            }
        }
    }
}

class StringParser {
    constructor(str) {
        this.i = 0;
        this.str = str;
        while (this.i < this.str.length) {
            if (!this.isSeparator(this.str[this.i]))
                break;
            this.i++;
        }
    }
    isSeparator(c) {
        return (c === "," || c === " " || c === "\n");
    }
    getNextValue() {
        const startI = this.i;
        const inQuotes = (this.str[this.i] === "\"");
        if (inQuotes)
            this.i++;
        let c = '';
        while (this.i < this.str.length) {
            c = this.str[this.i];
            if (inQuotes) {
                if (c === "\\") {
                    this.i += 2;
                    continue;
                }
                else if (c === "\"") {
                    this.i++;
                    break;
                }
            }
            else {
                if (this.isSeparator(c)) {
                    break;
                }
            }
            this.i++;
        }
        const value = this.str.substring(startI, this.i);
        while (this.i < this.str.length) {
            if (!(this.str[this.i] === "," || this.str[this.i] === " "))
                break;
            this.i++;
        }
        const processedValue = (inQuotes) ? String(JSON.parse(value)) : value;
        return processedValue;
    }
    getNextLine() {
        const startI = this.i;
        while (this.i < this.str.length) {
            if (this.str[this.i] === "\n")
                break;
            this.i++;
        }
        const value = this.str.substring(startI, this.i);
        this.goToNextLine();
        return value;
    }
    goToNextLine() {
        while (this.i < this.str.length) {
            if (this.str[this.i] === "\n")
                break;
            this.i++;
        }
        this.i++;
        while (this.i < this.str.length) {
            if (!(this.isSeparator(this.str[this.i])))
                break;
            this.i++;
        }
    }
}
class SelectImageClass {
    constructor(imageEl) {
        this.imageURL = "";
        this.usingImageURL = "";
        this.imageBlob = null;
        this.usingImageBlob = null;
        this.imageBase64 = "";
        this.aspectRatio = 0;
        this.imageEl = imageEl;
    }
    readImage(base64) {
        return (fetch(base64)
            .then((response) => (response.blob())));
    }
    loadImage(file) {
        if (!file) {
            return;
        }
        if (!file.type.startsWith('image/')) {
            alert("Выберите файл изображения в формате (.jpg, .png, .gif, ...)");
            return;
        }
        this.changeImage(file);
    }
    changeImage(obj) {
        if (this.imageURL !== this.usingImageURL) {
            URL.revokeObjectURL(this.imageURL);
        }
        this.imageURL = URL.createObjectURL(obj);
        this.imageBlob = obj;
        this.refreshImage();
    }
    refreshImage() {
        this.imageEl.onload = () => {
            showEl(this.imageEl);
        };
        this.imageEl.src = this.imageURL;
    }
    async applyImage() {
        if (this.imageBlob && this.imageBlob !== this.usingImageBlob) {
            this.usingImageBlob = this.imageBlob;
            URL.revokeObjectURL(this.usingImageURL);
            this.usingImageURL = this.imageURL;
            this.imageBase64 = await readFile(this.usingImageBlob, "dataURL");
            await new Promise((resolve) => {
                this.imageEl.onload = () => {
                    resolve(this.imageEl);
                };
                this.imageEl.src = this.imageURL;
            })
                .then((imageEl) => {
                this.aspectRatio = imageEl.naturalWidth / imageEl.naturalHeight;
            });
        }
    }
    rejectImage() {
        if (this.imageBlob !== this.usingImageBlob) {
            this.imageBlob = this.usingImageBlob;
            URL.revokeObjectURL(this.imageURL);
            this.imageURL = this.usingImageURL;
        }
    }
}

            alert("Файл не подходит");
            await this.loadFromLocal();
        }
    }
    saveToLocal() {
        localStorage.setItem("base", this.getBase());
    }
    async loadFromLocal() {
        const base = localStorage.getItem("base");
        try {
            await this.setBase((base) ? base : initialBase);
        }
        catch {
            await this.setBase(initialBase);
        }
    }
    getBase() {
        let str = "";
        str =
            String(this.columns) + ","
                + String(this.rows) + ","
                + ((this.needToShuffle) ? "1" : "0") + "\n";
        for (let i = 0; i < (this.columns * this.rows); i++) {
            const questionO = this.questions[i];
            str +=
                JSON.stringify(questionO.question) + ","
                    + String(questionO.difficulty) + ","
                    + String(questionO.points) + "\n";
        }
        if (!this.imageClass.imageBase64)
            alert("no image base");
        str += this.imageClass.imageBase64;
        return str;
    }
    async setBase(str) {
        const parser = new StringParser(str);
        {
            const value = parser.getNextValue();
            if (!(/^\d+$/.test(value)))
                throw Error();
            this.columns = parseInt(value);
        }
        this.rows = parseInt(parser.getNextValue());
        this.needToShuffle = (parser.getNextValue() === "1");
        parser.goToNextLine();
        this.questions.splice(0);
        for (let i = 0; i < (this.columns * this.rows); i++) {
            const question = parser.getNextValue();
            const difficulty = parseInt(parser.getNextValue());
            const points = parseInt(parser.getNextValue());
            this.questions.push({ question, difficulty, points });
            parser.goToNextLine();
        }
        const imageBase64 = parser.getNextLine();
        if (!imageBase64.startsWith("data:"))
            throw Error();
        this.imageClass.changeImage(await this.imageClass.readImage(imageBase64));
        await this.imageClass.applyImage();
        this.begin();
        this.createCells();
        scaleContainer.scaleContainer();
        this.saveToLocal();
        return;
    }
}
const app = new App();
{
    el.bDropdown.addEventListener("click", function (event) {
        event.stopPropagation();
        if (el.dropdownContent.classList.contains("hidden")) {
            window.addEventListener("click", function (event) {
                let caller = event.target;
                if (caller && caller.classList.contains("dropdownButton")) {
                    if (caller.dataset.action) {
                        app.selectDropdownButtons(Number(caller.dataset.action));
                    }
                }
                hideEl(el.dropdownContent);
            }, { once: true });
        }
        showEl(el.dropdownContent);
    });
    el.cellTable.addEventListener("click", function (event) {
        let caller = event.target;
        const master = event.currentTarget;
        while (caller && caller !== master) {
            if (caller.classList.contains("cell-whole")) {
                app.interactWithCell(caller);
                break;
            }
            caller = caller.parentElement;
        }
    });
    el.divModal.addEventListener("click", function (event) {
        if (app.modalPrps.index !== 1 && app.modalPrps.index !== 2) {
            let caller = event.target;
            if (caller && caller.classList.contains("ev-transparent")) {
                app.closeModal();
            }
        }
    });
    el.cellTable.addEventListener("dragstart", function (event) {
        event.preventDefault();
    });
    el.fSelectImage.addEventListener("click", function () {
        el.fLoadImage.click();
    });
    el.fLoadImage.addEventListener("change", function () {
        if (el.fLoadImage.files) {
            app.imageClass.loadImage(el.fLoadImage.files[0]);
        }
    });
    el.fLoadTable.addEventListener("change", function () {
        if (el.fLoadTable.files) {
            app.loadBaseFromComputer(el.fLoadTable.files[0]);
        }
        el.fLoadTable.value = "";
    });
    window.addEventListener("resize", function () {
        scaleContainer.scaleContainer();
    });
}
